name: Bug report
description: Something in the framework is broken or behaving incorrectly.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below — the more specific you are, the faster we can help.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I run `sop-agent new "..."`, the output is missing the KPIs section.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The KPIs section should be populated from the SOP template.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible steps. Include the exact command and any overlay path used.
      placeholder: |
        1. Run `sop-agent new "Quarterly content audit" --overlay ./examples/lean-operator`
        2. Open the generated file in `.sop-output/`
        3. Observe that the KPIs section is empty
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version of sop-agent
      description: Run `sop-agent --version` or paste the commit SHA you're on.
      placeholder: "0.1.0 / commit abcd1234"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Which surface are you using?
      options:
        - Python CLI
        - Claude Code plugin
        - Both / not sure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14 / Ubuntu 22.04"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.7"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste error messages, stack traces, or `--verbose` output here.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I'm on the latest version (or a recent commit) of `main`
          required: false
